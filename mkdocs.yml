site_name: C# Idioms & Practical Patterns Notes
site_description: 実務で役立つ C# のイディオム、定石、設計パターン、落とし穴をまとめる日本語ノート
site_url: https://t-shirayama.github.io/csharp-idioms-patterns-notes/
repo_url: https://github.com/t-shirayama/csharp-idioms-patterns-notes
repo_name: t-shirayama/csharp-idioms-patterns-notes

docs_dir: docs
site_dir: site

theme:
  name: material
  language: ja
  features:
    - navigation.instant
    - navigation.tabs
    - navigation.tabs.sticky
    - navigation.sections
    - navigation.prune
    - navigation.top
    - search.highlight
    - search.suggest
    - content.code.copy

extra_css:
  - stylesheets/extra.css

markdown_extensions:
  - admonition
  - tables
  - toc:
      permalink: true
  - pymdownx.highlight:
      anchor_linenums: true
  - pymdownx.inlinehilite
  - pymdownx.superfences
  - pymdownx.tasklist:
      custom_checkbox: true

plugins:
  - search:
      lang: ja

